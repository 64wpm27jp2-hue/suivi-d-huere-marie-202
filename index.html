<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mes Heures Apprenti</title>

<style>
body{
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
}

.card{
    background:#1d1d1d;
    border-radius:20px;
    padding:20px;
    margin-bottom:20px;
}

h1{
    color:#f5a623;
}

h2{
    color:#f5a623;
    font-size:18px;
}

label{
    display:block;
    margin-top:10px;
}

input, select{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    margin-top:5px;
}

button{
    width:100%;
    padding:12px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background:#f5a623;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.result{
    font-size:18px;
    margin-top:15px;
    color:#f5a623;
}
</style>
</head>

<body>

<div class="container">

<h1>🥖 Mes Heures Apprenti</h1>

<div class="card">

<h2>Mon Contrat</h2>

<label>Âge</label>
<input type="number" id="age" value="21">

<label>Année d'apprentissage</label>
<select id="annee">
<option value="1">1ère année</option>
<option value="2">2ème année</option>
<option value="3">3ème année</option>
</select>

<label>SMIC Brut (€)</label>
<input type="number" id="smic" value="12.34" step="0.01">

</div>

<div class="card">

<h2>Mes Heures</h2>

<label>Heures normales</label>
<input type="number" id="normales" value="151.67">

<label>Heures de nuit</label>
<input type="number" id="nuit" value="0">

<label>Heures dimanche</label>
<input type="number" id="dimanche" value="0">

<label>Heures férié</label>
<input type="number" id="ferie" value="0">

<label>Heures supplémentaires</label>
<input type="number" id="sup" value="0">

</div>

<button onclick="calculer()">Calculer le salaire</button>

<div class="card">

<h2>Résultat</h2>

<p id="taux"></p>
<p id="salaireBase"></p>
<p id="majorations"></p>

<div class="result" id="total"></div>

</div>

</div>

<script>

function calculer(){

let age = Number(document.getElementById("age").value);
let annee = Number(document.getElementById("annee").value);
let smic = Number(document.getElementById("smic").value);

let pourcentage = 0;

if(age >= 21 && age <= 25){
    if(annee == 1) pourcentage = 53;
    if(annee == 2) pourcentage = 61;
    if(annee == 3) pourcentage = 78;
}

let taux = smic * pourcentage / 100;

let normales = Number(document.getElementById("normales").value);
let nuit = Number(document.getElementById("nuit").value);
let dimanche = Number(document.getElementById("dimanche").value);
let ferie = Number(document.getElementById("ferie").value);
let sup = Number(document.getElementById("sup").value);

let base = normales * taux;
let majNuit = nuit * taux * 0.25;
let majDimanche = dimanche * taux * 0.50;
let majFerie = ferie * taux * 0.50;
let majSup = sup * taux * 0.25;

let total = base + majNuit + majDimanche + majFerie + majSup;

document.getElementById("taux").innerHTML =
"Taux horaire : " + taux.toFixed(2) + " €/h";

document.getElementById("salaireBase").innerHTML =
"Salaire de base : " + base.toFixed(2) + " €";

document.getElementById("majorations").innerHTML =
"Majorations : " +
(majNuit + majDimanche + majFerie + majSup).toFixed(2) + " €";

document.getElementById("total").innerHTML =
"💰 Salaire estimé : " + total.toFixed(2) + " €";
}

calculer();

</script>

</body>
</html>

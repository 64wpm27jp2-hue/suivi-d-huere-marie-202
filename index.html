<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Mes Heures Apprenti</title>

<style>

body{
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

.header{
    padding:25px;
}

.logo{
    font-size:42px;
}

.title{
    color:#f5a623;
    font-size:42px;
    font-weight:bold;
}

.subtitle{
    color:#8a8a8a;
    font-size:20px;
}

.tabs{
    display:flex;
    justify-content:space-around;
    border-top:1px solid #333;
    border-bottom:1px solid #333;
}

.tab{
    padding:18px;
    cursor:pointer;
    color:#999;
    font-weight:bold;
}

.tab.active{
    color:#f5a623;
    border-bottom:4px solid #f5a623;
}

.content{
    display:none;
    padding:20px;
}

.content.active{
    display:block;
}

.card{
    background:#1a1a1a;
    border-radius:25px;
    padding:20px;
    margin-bottom:20px;
    border:1px solid #2e2e2e;
}

.section-title{
    color:#888;
    font-size:14px;
    letter-spacing:2px;
    margin-bottom:20px;
}

input,select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:12px;
    background:#2a2a2a;
    color:white;
    margin-bottom:12px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:15px;
    background:#f5a623;
    color:white;
    font-size:18px;
    cursor:pointer;
}

.resultat{
    font-size:22px;
    color:#f5a623;
    font-weight:bold;
}

.danger{
    background:#e45b5b;
}

</style>
</head>

<body>

<div class="header">
    <div class="logo">🥖</div>
    <div class="title">Mes Heures</div>
    <div class="subtitle">Apprenti Boulanger</div>
</div>

<div class="tabs">
    <div class="tab active" onclick="ouvrirOnglet('ajouter',this)">AJOUTER</div>
    <div class="tab" onclick="ouvrirOnglet('historique',this)">HISTORIQUE</div>
    <div class="tab" onclick="ouvrirOnglet('recap',this)">RÉCAP</div>
    <div class="tab" onclick="ouvrirOnglet('reglages',this)">RÉGLAGES</div>
</div>

<!-- AJOUTER -->
<div id="ajouter" class="content active">

    <div class="card">
        <div class="section-title">AJOUTER DES HEURES</div>

        <input type="number" id="heures" placeholder="Heures travaillées">

        <button onclick="calculer()">
            Calculer le salaire
        </button>

        <p class="resultat" id="resultat"></p>
    </div>

</div>

<!-- HISTORIQUE -->
<div id="historique" class="content">

    <div class="card">
        <div class="section-title">HISTORIQUE</div>

        <p>Aucune donnée enregistrée.</p>
    </div>

</div>

<!-- RECAP -->
<div id="recap" class="content">

    <div class="card">
        <div class="section-title">RÉCAPITULATIF</div>

        <p id="recapSalaire">
            Aucun calcul effectué.
        </p>

    </div>

</div>

<!-- REGLAGES -->
<div id="reglages" class="content">

    <div class="card">

        <div class="section-title">MON CONTRAT</div>

        <input type="number" id="taux" value="7.85">

        <input type="number" value="35">

        <input type="number" value="50">

        <input type="number" value="50">

        <input type="number" value="25">

        <input type="number" value="25">

    </div>

    <div class="card">

        <div class="section-title">DANGER ZONE</div>

        <button class="danger">
            🗑️ Effacer toutes les données
        </button>

    </div>

</div>

<script>

function ouvrirOnglet(id,element){

    document.querySelectorAll(".content")
        .forEach(x=>x.classList.remove("active"));

    document.querySelectorAll(".tab")
        .forEach(x=>x.classList.remove("active"));

    document.getElementById(id)
        .classList.add("active");

    element.classList.add("active");
}

function calculer(){

    let heures =
        Number(document.getElementById("heures").value);

    let taux =
        Number(document.getElementById("taux").value);

    let salaire = heures * taux;

    document.getElementById("resultat").innerHTML =
        salaire.toFixed(2) + " €";

    document.getElementById("recapSalaire").innerHTML =
        "Salaire estimé : " +
        salaire.toFixed(2) + " €";
}

</script>

</body>
</html>
